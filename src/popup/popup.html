<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 16px;
    }

    h1 {
      font-size: 16px;
      color: #e94560;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px;
      color: #666;
      margin-bottom: 16px;
    }

    .stats {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
      padding: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
    }

    .section {
      margin-bottom: 16px;
    }

    .section label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #ccc;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .toggle-row span {
      font-size: 13px;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 22px;
      cursor: pointer;
      transition: 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #888;
      border-radius: 50%;
      transition: 0.2s;
    }

    .switch input:checked + .slider { background: #e94560; }
    .switch input:checked + .slider::before {
      transform: translateX(18px);
      background: #fff;
    }

    /* Mode selector */
    .mode-buttons {
      display: flex;
      gap: 8px;
    }

    .mode-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid #333;
      border-radius: 6px;
      background: transparent;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: 0.15s;
    }

    .mode-btn:hover { border-color: #e94560; }

    .mode-btn.active {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.15);
      color: #e94560;
      font-weight: 600;
    }

    /* Pattern list */
    .pattern-list {
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px;
      margin-bottom: 8px;
    }

    .pattern-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 6px;
      font-size: 12px;
      border-radius: 4px;
    }

    .pattern-item:hover { background: rgba(255,255,255,0.05); }

    .pattern-item button {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
    }

    .pattern-item button:hover { color: #e94560; }

    .pattern-item.readonly {
      color: #888;
    }

    .add-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }

    .add-row input {
      flex: 1;
      padding: 6px 8px;
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      color: #eee;
      font-size: 12px;
    }

    .add-row input::placeholder { color: #555; }

    .add-row button, .add-btn {
      padding: 6px 12px;
      background: #e94560;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .add-row button:hover, .add-btn:hover { background: #c7364e; }

    .cooc-inputs {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }

    .cooc-inputs input {
      flex: 1;
      padding: 6px 8px;
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      color: #eee;
      font-size: 11px;
    }

    .cooc-inputs input::placeholder { color: #555; }

    /* Collapsible built-in patterns */
    .collapsible-header {
      font-size: 11px;
      color: #666;
      cursor: pointer;
      padding: 4px 0;
      user-select: none;
    }

    .collapsible-header:hover { color: #e94560; }

    .collapsible-body {
      display: none;
      margin-top: 4px;
    }

    .collapsible-body.open {
      display: block;
    }

    .builtin-item {
      font-size: 11px;
      color: #666;
      padding: 2px 6px;
    }

    /* Test mode */
    .test-mode-row { opacity: 0.8; }
    .test-badge {
      font-size: 9px;
      font-weight: 700;
      background: #e2a308;
      color: #1a1a2e;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .switch--test input:checked + .slider { background: #e2a308; }

    .subsection {
      margin-bottom: 12px;
    }

    .subsection-label {
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <h1>LinkedIn Detox</h1>
  <div class="subtitle">Because your feed deserves better.</div>

  <div class="stats">
    Posts blocked this session: <strong id="blocked-count">0</strong>
  </div>

  <div class="section">
    <div class="toggle-row">
      <span>Enabled</span>
      <label class="switch">
        <input type="checkbox" id="toggle-enabled" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row test-mode-row">
      <span>Test Mode <span class="test-badge">DEBUG</span></span>
      <label class="switch switch--test">
        <input type="checkbox" id="toggle-test-mode">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <label>Mode</label>
    <div class="mode-buttons">
      <button class="mode-btn active" data-mode="roast">Roast</button>
      <button class="mode-btn" data-mode="hide">Hide</button>
    </div>
  </div>

  <div class="section">
    <label>Sensitivity</label>
    <div class="mode-buttons">
      <button class="mode-btn sensitivity-btn" data-sensitivity="chill">Chill</button>
      <button class="mode-btn sensitivity-btn active" data-sensitivity="suspicious">Suspicious</button>
      <button class="mode-btn sensitivity-btn" data-sensitivity="unhinged">Unhinged</button>
    </div>
  </div>

  <div class="section">
    <label>Custom Patterns</label>

    <div class="subsection">
      <div class="subsection-label">Signal Words</div>
      <div class="pattern-list" id="signal-word-list"></div>
      <div class="add-row">
        <input type="text" id="new-signal-word" placeholder="Add a signal word (e.g. leverage)">
        <button id="add-signal-word-btn">Add</button>
      </div>
      <div class="collapsible-header" id="toggle-builtin-words">Show built-in words</div>
      <div class="collapsible-body" id="builtin-words"></div>
    </div>

    <div class="subsection">
      <div class="subsection-label">Co-occurrence Patterns</div>
      <div class="pattern-list" id="cooc-list"></div>
      <div class="cooc-inputs">
        <input type="text" id="new-cooc-a" placeholder="Group A (comma-sep)">
        <input type="text" id="new-cooc-b" placeholder="Group B (comma-sep)">
      </div>
      <div class="add-row">
        <input type="text" id="new-cooc-label" placeholder="Label (e.g. humble brag)">
        <button id="add-cooc-btn">Add</button>
      </div>
      <div class="collapsible-header" id="toggle-builtin-cooc">Show built-in patterns</div>
      <div class="collapsible-body" id="builtin-cooc"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
